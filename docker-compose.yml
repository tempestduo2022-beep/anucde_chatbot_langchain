services:
  # 1. THE OLLAMA LLM SERVER
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    volumes:
      - ollama_storage:/root/.ollama
    ports:
      - "11434:11434"

  # 2. THE AUTOMATIC MODEL PULLER
  # This service ensures the model is downloaded when the cluster starts.
  ollama-puller:
    image: curlimages/curl:latest
    container_name: ollama_puller
    depends_on:
      - ollama
    # Wait for ollama to be ready, then pull qwen2.5:1.5b
    entrypoint: [ "sh", "-c", "sleep 10 && curl http://ollama:11434/api/pull -d '{\"name\": \"qwen2.5:3b\"}'" ]

  # 3. THE CHATBOT BACKEND
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatbot_backend
    restart: always
    depends_on:
      - ollama
    # No direct ports exposed to host. Nginx handles it.
    environment:
      # Tells the backend to talk to the ollama container name inside Docker network
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./backend/faiss_index:/app/faiss_index

  # 4. THE NGINX SERVER (Gateway)
  nginx:
    image: nginx:alpine
    container_name: chatbot_nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  ollama_storage:
