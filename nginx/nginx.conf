events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Gzip for performance (Streaming is already handled below)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    server {
        listen 80;
        server_name localhost;

        # 1. API Reverse Proxy
        location / {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;

            # --- CRITICAL FOR STREAMING ---
            # Disable buffering to allow tokens to flow in real-time
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            tcp_nopush on;
            tcp_nodelay on;
        }

        # 2. (Optional) Static Files 
        # If you want to access the frontend via http://localhost/frontend/test-integration.html
        location /frontend/ {
            alias /usr/share/nginx/html/;
            index test-integration.html;
        }
    }
}
